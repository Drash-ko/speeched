<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-label="Speeched banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#0d3550"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <circle cx="1010" cy="82" r="168" fill="#38bdf8" opacity="0.08"/>
  <circle cx="865" cy="332" r="180" fill="#22c55e" opacity="0.06"/>

  <g transform="translate(86 78)">
    <text x="0" y="64" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="900">Speeched</text>
    <text x="4" y="112" fill="#bae6fd" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Private voice messages into clean text</text>
    <text x="4" y="154" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="19">Local-first transcription bot powered by faster-whisper, llama.cpp, SQLite, and Docker.</text>

