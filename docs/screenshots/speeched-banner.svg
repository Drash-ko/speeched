      <text x="343" y="26" text-anchor="middle" fill="#dbeafe" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">SQLite</text>
    </g>
  </g>

  <g transform="translate(770 132)" stroke="url(#line)" stroke-width="10" stroke-linecap="round">
